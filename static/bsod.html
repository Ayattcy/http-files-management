<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>:(</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0078d7;
            color: #fff;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            cursor: none;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .sad-face {
            font-size: 120px;
            font-weight: 300;
            margin-bottom: 30px;
            line-height: 1;
        }

        .main-message {
            font-size: 28px;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .progress {
            margin: 30px 0;
        }

        .progress-text {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: #fff;
            width: 0%;
            animation: progress 3s ease-in-out forwards;
        }

        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .progress-fill.finished {
            animation: none;
            width: 100%;
        }

        .details {
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.9;
        }

        .qr-section {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-top: 30px;
        }

        .qr-code {
            width: 100px;
            height: 100px;
            background-color: #fff;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #0078d7;
            text-align: center;
        }

        .qr-text {
            font-size: 12px;
            line-height: 1.6;
            max-width: 300px;
        }

        .error-code {
            margin-top: 30px;
            font-size: 12px;
            font-family: "Consolas", monospace;
            opacity: 0.8;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sad-face">:(</div>
        <div class="main-message">
            你的软件遇到了一些问题，需要重启。<br>
            我们只收集某些错误信息，然后为你重新启动。
        </div>
        
        <div class="progress">
            <div class="progress-text"><span id="progress-percent">0</span>% 完成</div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>

        <div class="qr-section">
            <div class="qr-code">
                协议验证失败
            </div>
            <div class="qr-text">
                有关此问题的详细信息和可能的解决方法，请访问<br>
                https://www.example.com/license_error
            </div>
        </div>

        <div class="error-code">
            终止代码: INTEGRITY_CHECK_FAILED<br>
            失败的操作: LICENSE_VIOLATION<br>
            <br>
            按 Alt+F4 退出
        </div>
    </div>

    <script>
        // 自动全屏
        function enterFullscreen() {
            const doc = document.documentElement;
            if (doc.requestFullscreen) {
                doc.requestFullscreen().catch(() => {});
            } else if (doc.webkitRequestFullscreen) {
                doc.webkitRequestFullscreen().catch(() => {});
            } else if (doc.mozRequestFullScreen) {
                doc.mozRequestFullScreen().catch(() => {});
            } else if (doc.msRequestFullscreen) {
                doc.msRequestFullscreen().catch(() => {});
            }
        }

        // 页面加载后立即全屏并播放错误音效
        let soundPlayed = false;
        const errorSound = new Audio('/sounds/erro_msg.mp3');

        function playErrorSound() {
            if (!soundPlayed) {
                errorSound.play().then(() => {
                    soundPlayed = true;
                }).catch(() => {
                    // 播放失败，等待用户交互
                });
            }
        }

        window.addEventListener('load', function() {
            enterFullscreen();
            // 持续尝试全屏
            setInterval(enterFullscreen, 100);

            // 尝试播放错误音效
            playErrorSound();
        });

        // 任何交互都尝试全屏和播放音效
        document.addEventListener('click', function() {
            enterFullscreen();
            playErrorSound();
        });
        document.addEventListener('mousemove', function() {
            enterFullscreen();
            playErrorSound();
        });
        document.addEventListener('keydown', function() {
            enterFullscreen();
            playErrorSound();
        });
        document.addEventListener('scroll', enterFullscreen);
        document.addEventListener('resize', enterFullscreen);

        // 防止退出全屏 - 立即重新进入
        document.addEventListener('fullscreenchange', function() {
            if (!document.fullscreenElement) {
                enterFullscreen();
            }
        });
        document.addEventListener('webkitfullscreenchange', function() {
            if (!document.webkitFullscreenElement) {
                enterFullscreen();
            }
        });
        document.addEventListener('mozfullscreenchange', function() {
            if (!document.mozFullScreenElement) {
                enterFullscreen();
            }
        });
        document.addEventListener('MSFullscreenChange', function() {
            if (!document.msFullscreenElement) {
                enterFullscreen();
            }
        });

        // 更新进度百分比
        let percent = 0;
        const progressInterval = setInterval(() => {
            percent += Math.floor(Math.random() * 3) + 1;
            if (percent >= 100) {
                percent = 100;
                clearInterval(progressInterval);
                // 保持进度条在100%
                document.querySelector('.progress-fill').classList.add('finished');
            }
            document.getElementById('progress-percent').textContent = percent;
        }, 100);

        // 禁止一切快捷键
        document.addEventListener('keydown', function(e) {
            // 禁止 F12
            if (e.key === 'F12') {
                e.preventDefault();
                return false;
            }

            // 禁止 Ctrl+Shift+I (开发者工具)
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i')) {
                e.preventDefault();
                return false;
            }

            // 禁止 Ctrl+Shift+J (控制台)
            if (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j')) {
                e.preventDefault();
                return false;
            }

            // 禁止 Ctrl+Shift+C (元素检查)
            if (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c')) {
                e.preventDefault();
                return false;
            }

            // 禁止 Ctrl+U (查看源代码)
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) {
                e.preventDefault();
                return false;
            }

            // 禁止 Ctrl+S (保存页面)
            if (e.ctrlKey && (e.key === 'S' || e.key === 's')) {
                e.preventDefault();
                return false;
            }

            // 禁止 Ctrl+P (打印)
            if (e.ctrlKey && (e.key === 'P' || e.key === 'p')) {
                e.preventDefault();
                return false;
            }

            // 禁止 Alt+方向键 (前进后退)
            if (e.altKey && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
                e.preventDefault();
                return false;
            }

            // 禁止 Ctrl+R / F5 (刷新)
            if ((e.ctrlKey && (e.key === 'r' || e.key === 'R')) || e.key === 'F5') {
                e.preventDefault();
                return false;
            }

            // 禁止 Ctrl+W (关闭标签)
            if (e.ctrlKey && (e.key === 'w' || e.key === 'W')) {
                e.preventDefault();
                return false;
            }

            // 禁止 Escape
            if (e.key === 'Escape') {
                e.preventDefault();
                return false;
            }

            // 允许 Alt+F4 退出
            if (e.altKey && e.key === 'F4') {
                return true;
            }
        }, true);

        // 禁止右键菜单
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        }, true);

        // 禁止拖拽
        document.addEventListener('dragstart', function(e) {
            e.preventDefault();
            return false;
        }, true);

        // 禁止选择文本
        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
            return false;
        }, true);

        // 尝试禁用开发者工具的另一种方式
        setInterval(function() {
            const threshold = 160;
            if (window.outerHeight - window.innerHeight > threshold ||
                window.outerWidth - window.innerWidth > threshold) {
                // 检测到开发者工具可能被打开
                document.body.innerHTML = '<div style="background:#0078d7;color:#fff;font-size:48px;text-align:center;padding-top:20%;">:(</div>';
            }
        }, 1000);
    </script>
</body>
</html>
